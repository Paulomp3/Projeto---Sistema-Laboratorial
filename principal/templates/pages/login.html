<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LabSystem IFPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: #1a3a1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(74,152,84,.18) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(106,184,116,.12) 0%, transparent 40%);
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            width: 62px; height: 62px;
            background: #3a8043;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .header p {
            font-size: 12px;
            color: #6ab874;
            margin-top: 4px;
            letter-spacing: .3px;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 6px;
        }

        .input-wrap { position: relative; }

        .input-wrap i {
            position: absolute;
            left: 11px;
            top: 50%; transform: translateY(-50%);
            color: #9ca3af;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 11px 12px 11px 36px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            color: #1a1d23;
            outline: none;
            transition: border-color .15s;
        }

        input:focus { border-color: #4a9854; }
        input::placeholder { color: #9ca3af; }

        button {
            width: 100%;
            padding: 12px;
            background: #2d6a35;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            transition: background .15s;
        }

        button:hover { background: #1e4a25; }

        .footer {
            margin-top: 22px;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,.35);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo"><i class="fa-solid fa-flask"></i></div>
            <h1>LabSystem</h1>
            <p>IFPA – Campus Itaituba</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="identificacao">Matrícula ou SIAPE</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="identificacao" placeholder="Ex: 20231001 ou 1234567">
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" placeholder="••••••••">
                </div>
            </div>

            <button type="button">
                <i class="fa-solid fa-right-to-bracket"></i> Entrar
            </button>
        </div>

        <p class="footer">Sistema de Gestão de Laboratórios · IFPA Itaituba © 2025</p>
    </div>
</body>
</html>
