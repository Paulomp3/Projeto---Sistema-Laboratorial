<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LabSystem IFPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green-900: #1a3a1f;
            --green-800: #1e4a25;
            --green-700: #2d6a35;
            --green-600: #3a8043;
            --green-500: #4a9854;
            --green-400: #6ab874;
            --green-100: #e8f5ea;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-700: #3d4250;
            --gray-900: #1a1d23;
            --white: #ffffff;
            --danger: #c0392b;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--green-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(74,152,84,.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(106,184,116,.1) 0%, transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(45,106,53,.2) 0%, transparent 45%);
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 64px; height: 64px;
            background: var(--green-600);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: var(--white);
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -.3px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--green-400);
            margin-top: 4px;
        }

        .login-card {
            background: var(--white);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 700;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%; transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 14px;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            color: var(--gray-900);
            background: var(--white);
            transition: border-color .15s, box-shadow .15s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--green-500);
            box-shadow: 0 0 0 3px rgba(74,152,84,.12);
        }

        .form-control::placeholder { color: var(--gray-400); }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--green-700);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s, transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-login:hover { background: var(--green-800); }
        .btn-login:active { transform: scale(.98); }

        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,.4);
        }

        /* Django messages */
        .messages-box { margin-bottom: 16px; }
        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .msg-error { background: #fde8e8; color: #9b1c1c; }
        .msg-success { background: var(--green-100); color: var(--green-800); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="login-logo"><i class="fa-solid fa-flask"></i></div>
            <h1 class="login-title">LabSystem</h1>
            <p class="login-subtitle">IFPA – Campus Itaituba</p>
        </div>

        <div class="login-card">
            {% if messages %}
            <div class="messages-box">
                {% for message in messages %}
                <div class="msg msg-{{ message.tags }}">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label" for="id_identificacao">Matrícula ou SIAPE</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-id-card"></i>
                        <input
                            type="text"
                            id="id_identificacao"
                            name="identificacao"
                            class="form-control"
                            placeholder="Ex: 20231001 ou 1234567"
                            required
                            autofocus
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="id_senha">Senha</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input
                            type="password"
                            id="id_senha"
                            name="password"
                            class="form-control"
                            placeholder="••••••••"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Entrar
                </button>
            </form>
        </div>

        <p class="login-footer">Sistema de Gestão de Laboratórios · IFPA Itaituba &copy; 2025</p>
    </div>
</body>
</html>
